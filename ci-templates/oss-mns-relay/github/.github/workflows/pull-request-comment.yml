# .github/workflows/pull-request-comment.yml
name: Pull Request Comment Handler

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
    DEV_ACCESS_KEY_ID: ${{ secrets.DEV_ACCESS_KEY_ID }}
    DEV_ACCESS_KEY_SECRET: ${{ secrets.DEV_ACCESS_KEY_SECRET }}
    PROD_ACCESS_KEY_ID: ${{ secrets.PROD_ACCESS_KEY_ID }}
    PROD_ACCESS_KEY_SECRET: ${{ secrets.PROD_ACCESS_KEY_SECRET }}
    STAGING_ACCESS_KEY_ID: ${{ secrets.STAGING_ACCESS_KEY_ID }}
    STAGING_ACCESS_KEY_SECRET: ${{ secrets.STAGING_ACCESS_KEY_SECRET }}

jobs:
  get_trigger_info:
    if: github.event.issue.pull_request
    uses: ./.github/workflows/shared-ci-get-pull-request-info.yml
    secrets: inherit
    with:
      pr_number: ${{ github.event.issue.number }}
      comment_body: ${{ github.event.comment.body }}

  process_trigger_file:
    needs: get_trigger_info
    uses: ./.github/workflows/shared-ci-upload-trigger-file.yml
    secrets: inherit
    with:
      command: ${{ needs.get_trigger_info.outputs.command }}
      base_ref: ${{ needs.get_trigger_info.outputs.base_ref }}
      head_sha: ${{ needs.get_trigger_info.outputs.head_sha }}
      all_changed_stacks: ${{ needs.get_trigger_info.outputs.all_changed_stacks }}
      trigger_file_name: "PR${{ github.event.issue.number }}-[${{ github.actor }}]-${{ github.run_number }}.json"

  get_exec_result:
    needs: process_trigger_file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: code
          ref: ${{ needs.get_trigger_info.outputs.head_sha }}

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          path: governance
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          sparse-checkout: |
            scripts/parse_exec_result.py

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alibabacloud-oss-v2
          pip install PyYAML

      - name: Get execution result
        id: get_result
        run: |
          result_path="${{ needs.process_trigger_file.outputs.result_path }}"
          echo -n "${{ secrets.OSS_CREDENTIALS }}" > oss_credentials.yaml

          ls -all
         
          # Run the script to get execution result
          python governance/scripts/parse_exec_result.py \
            --code-path="code" \
            --oss-url="${result_path}" \
            --output-file=execution_result.txt

          # Read the result file and set output
          if [ -f execution_result.txt ]; then
            # Convert file content to base64 to avoid special character issues
            result_base64=$(base64 -w 0 execution_result.txt)
            echo "result_content_base64=$result_base64" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const resultBase64 = '${{ steps.get_result.outputs.result_content_base64 }}';
            let resultContent = '❌ Failed to get execution result';

            if (resultBase64) {
              try {
                resultContent = Buffer.from(resultBase64, 'base64').toString('utf-8');
              } catch (error) {
                resultContent = '❌ Failed to decode execution result';
              }
            }

            const { data: comment } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `# 🚀 Execution Result

            ${resultContent}

            ---
            *This comment was automatically generated by the IAC workflow.*`
            });
