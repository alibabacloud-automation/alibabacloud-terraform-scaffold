# .github/workflows/shared-ci-upload-trigger.yml
name: Trigger IaCService

on:
  workflow_call:
    inputs:
      base_ref:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      command:
        required: true
        type: string
      all_changed_stacks:
        required: true
        type: string
      trigger_file_name:
        required: true
        type: string

    outputs:
      result_path:
        description: "The log path of the execution result"
        value: ${{ jobs.create_comment_trigger.outputs.result_path }}

jobs:
  create_comment_trigger:
    runs-on: ubuntu-latest
    outputs:
      result_path: ${{ steps.upload_trigger_event_file.outputs.RESULT_PATH }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: code
          ref: ${{ inputs.head_sha }}

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          path: governance
          ref: main
          sparse-checkout: |
            scripts/upload_iac_module.py
            scripts/trigger_stack.py

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alibabacloud_iacservice20210806==2.6.1
          pip install PyYAML

      - name: Upload source package and trigger event file
        id: upload_trigger_event_file
        env:
          DEV_ACCESS_KEY_ID: ${{ secrets.DEV_ACCESS_KEY_ID }}
          DEV_ACCESS_KEY_SECRET: ${{ secrets.DEV_ACCESS_KEY_SECRET }}
          PROD_ACCESS_KEY_ID: ${{ secrets.PROD_ACCESS_KEY_ID }}
          PROD_ACCESS_KEY_SECRET: ${{ secrets.PROD_ACCESS_KEY_SECRET }}
          STAGING_ACCESS_KEY_ID: ${{ secrets.STAGING_ACCESS_KEY_ID }}
          STAGING_ACCESS_KEY_SECRET: ${{ secrets.STAGING_ACCESS_KEY_SECRET }}
        run: |
          echo "Creating source package..."

          # Make yq script executable
          chmod +x governance/scripts/yaml_parser.py
          chmod +x governance/scripts/yq

          # Create symlink to simulate yq command
          mkdir -p ~/bin
          cp governance/scripts/yq ~/bin/yq
          cp governance/scripts/yaml_parser.py ~/bin/yaml_parser.py
          export PATH="$HOME/bin:$PATH"

          input_profiles="${{ inputs.all_changed_stacks }}"
          echo "Profiles: ${input_profiles}"
          profile_list=()
          stacks_list=()
          IFS=';' read -ra profile_stacks <<< "$input_profiles"
          for item in "${profile_stacks[@]}"; do
              IFS=':' read -r profile stacks <<< "$item"
              profile_list+=("$profile")
              stacks_list+=("$stacks")
          done
          echo "Profiles to process: ${profile_list[*]}"
          echo "Stacks to process: ${stacks_list[*]}"

          version_ids_list=()
          result_path_list=()
          failed_profiles=()
          index=0

          while [[ $index -lt ${#profile_list[@]} ]]; do
            profile="${profile_list[$index]}"

            echo ""
            echo "Processing profile: $profile"
            codeDir="code-$profile"

            mkdir $codeDir && cp -rp code/* $codeDir/
            cd $codeDir

            echo "Building package for profile: $profile"
            make_output_file=$(mktemp)
            make build-package PROFILE=$profile 2>&1 | tee "$make_output_file"
            make_exit_code=${PIPESTATUS[0]}
            make_output=$(cat "$make_output_file")
            rm -f "$make_output_file"
            if [ "$make_exit_code" -ne 0 ]; then
              echo "Error: Failed to build package for profile: $profile"
              exit 1
            fi
            hash=$(echo "$make_output" | grep -o "Hash: [a-f0-9]*" | awk '{print $2}')

            profile_file="stacks/profile.yaml"
            # Check if profile file exists
            if [ ! -f "$profile_file" ]; then
              echo "Error: Profile file not found: $profile_file"
              exit 1
            fi

            iac_region="cn-zhangjiakou"
            code_module_id=$(yq '.code_module_id' "$profile_file")
            access_key_id_name=$(yq '.access_key_id' "$profile_file")
            access_key_secret_name=$(yq '.access_key_secret' "$profile_file")

            # 从环境变量中获取，变量名与 access_key_id_name 和 access_key_secret_name 相同
            access_key_id="${!access_key_id_name}"
            access_key_secret="${!access_key_secret_name}"
          
            if [ -z "$access_key_id" ] || [ -z "$access_key_secret" ]; then
              echo "Error: Missing access key ID or access key secret"
              exit 1
            fi
            export IAC_REGION=$iac_region IAC_ACCESS_KEY_ID=$access_key_id IAC_ACCESS_KEY_SECRET=$access_key_secret CODE_MODULE_ID=$code_module_id
          
          
            mv $codeDir.zip ../
            cd ../
            ls -all *.zip

            echo "Uploading code package to IaCService module: $code_module_id"
            # Use tee to display output in real-time while capturing it
            output_file=$(mktemp)
            python governance/scripts/upload_iac_module.py --region=$iac_region --code_module_id=$code_module_id --file_path=$codeDir.zip 2>&1 | tee "$output_file"
            upload_exit_code=${PIPESTATUS[0]}
            output=$(cat "$output_file")
            rm -f "$output_file"

            if [ "$upload_exit_code" -ne 0 ]; then
              echo "Error: Failed to upload to IaCService for profile: $profile (exit code: $upload_exit_code)"
              exit 1
            fi

            echo "INFO: Upload successfully"
            version_id=$(echo "$output" | grep -o 'Version ID: [^,]*' | sed 's/.*Version ID: //')
            if [ -z "$version_id" ]; then
              echo "Warning: Could not extract version_id from output"
              version_id=""
            fi

            stacks="${stacks_list[$index]}"
            IFS=',' read -r -a stack_array <<< "$stacks"
            result_array=()
            for stack in "${stack_array[@]}"; do
              if [[ "$stack" != */ ]]; then
                  stack="${stack}/"
              fi
              result_array+=("stacks/${stack}")
            done
            stacks_final=$(IFS=','; echo "${result_array[*]}")
          
            echo "Triggering stack execution for command: ${{ inputs.command }}"
            export ACTION="${{ inputs.command }}" CODE_MODULE_VERSION="$version_id" CHANGE_FOLDERS="$stacks_final"
          
            trigger_output_file=$(mktemp)
            python governance/scripts/trigger_stack.py --region=$iac_region --code_module_id=$code_module_id 2>&1 | tee "$trigger_output_file"
            trigger_exit_code=${PIPESTATUS[0]}
            trigger_output=$(cat "$trigger_output_file")
            rm -f "$trigger_output_file"

            if [ "$trigger_exit_code" -ne 0 ]; then
              echo "Error: Failed to trigger stack execution for profile: $profile (exit code: $trigger_exit_code)"
              exit 1
            fi

            echo "INFO: Trigger stack execution successfully"
            trigger_id=$(echo "$trigger_output" | grep -o 'Trigger ID: [^,]*' | sed 's/.*Trigger ID: //')
            if [ -z "$trigger_id" ]; then
              echo "Warning: Could not extract trigger_id from output"
              exit 1
            fi

            result_path_list+=("$profile@$trigger_id")

            index=$((index+1))
          done

          result_path_list_final=$(IFS=';'; echo "${result_path_list[*]}")
          echo "$result_path_list_final"
          echo "RESULT_PATH=$result_path_list_final" >> $GITHUB_OUTPUT
          echo "All source package uploaded and stack execution triggered successfully"